        .swiper-pagination-bullet-active { background: #fff; }
        .card-img-container { height: 240px; }
        @media(min-width: 1024px) { .card-img-container { height: 280px; } }

        const formatCurrency = (num) => new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num);
        
        const calculateMortgage = (principal, annualRate, years) => {
            if (principal <= 0) return 0;
            const monthlyRate = (annualRate / 100) / 12;
            const n = years * 12;
            if (monthlyRate === 0) return principal / n;
            return principal * (monthlyRate * Math.pow(1 + monthlyRate, n)) / (Math.pow(1 + monthlyRate, n) - 1);
        };

                        </div>
                        <p class="text-sm text-base-content/80 line-clamp-3">${p.note}</p>
                        <div class="card-actions justify-end mt-4 border-t border-base-200 pt-4">
                            <button onclick="openModal(${index})" class="btn btn-primary btn-sm w-full">
                                <i class="fa-solid fa-magnifying-glass-plus"></i> View Details & Calculator
                            </button>
                        </div>
                    </div>
                </div>
                `;
            }).join('');

            // Initialize Swipers for Cards
            document.querySelectorAll('.swiper-card').forEach(el => {
                const id = el.id;
                if (!swipers[id]) {
                    swipers[id] = new Swiper(`#${id}`, {
                        loop: true,
                        spaceBetween: 0,
                        grabCursor: true,
                        pagination: { el: `#${id} .swiper-pagination`, clickable: true },
                        navigation: { nextEl: `#${id} .swiper-button-next`, prevEl: `#${id} .swiper-button-prev` },
                    });
                }
            });
        };

        // Map View Logic
        let map;
        let markers = [];
        const initMap = async () => {
            if (map) return; // Already initialized
            
            map = L.map('leaflet-map').setView([45.4850, -122.8050], 11);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
            }).addTo(map);

            // Geocode and add markers
            const geocodeUrl = (address) => `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`;
            
            for (let i = 0; i < properties.length; i++) {
                const p = properties[i];
                try {
                    // Small delay to respect Nominatim rate limits
                    await new Promise(resolve => setTimeout(resolve, 150));
                    const res = await fetch(geocodeUrl(p.address));
                    const data = await res.json();
                    
                    if (data && data.length > 0) {
                        const lat = data[0].lat;
                        const lon = data[0].lon;
                        
                        const iconColor = p.assumable ? '#10b981' : '#6366f1';
                        const customIcon = L.divIcon({
                            html: `<div style="background-color: ${iconColor}; color: white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.3); border: 2px solid white;">
                                ${p.assumable ? '<i class="fa-solid fa-bolt" style="font-size: 14px;"></i>' : '<i class="fa-solid fa-house" style="font-size: 12px;"></i>'}
                            </div>`,
                            className: '',
                            iconSize: [32, 32],
                            iconAnchor: [16, 16]
                        });

                        const marker = L.marker([lat, lon], { icon: customIcon }).addTo(map);
                        
                        const popupContent = `
                            <div class="p-2 font-sans" style="width: 250px;">
                                <img src="${p.imgs[0]}" alt="${p.address}" style="width:100%; height:120px; object-fit:cover; border-radius:8px; margin-bottom:8px;">
                                <h3 class="font-bold text-sm text-gray-900">${p.address}</h3>
                                <p class="text-indigo-600 font-extrabold my-1">${formatCurrency(p.price)} ${p.assumable ? '<span class="text-emerald-600 text-xs font-bold">(Assumable)</span>' : ''}</p>
                                <div class="text-xs text-gray-500 mb-3">${p.bedsBaths} • ${p.sqft.toLocaleString()} sqft</div>
                                <button onclick="openModal(${i})" class="w-full text-center bg-indigo-600 text-white py-2 rounded-lg text-xs font-bold hover:bg-indigo-700 transition">View Details</button>
                            </div>
                        `;
                        
                        marker.bindPopup(popupContent, { className: 'custom-popup' });
                        markers.push(marker);
                    }
                } catch (e) {
                    console.error("Geocoding failed for", p.address, e);
                }
            }
        };

        // View Switching
        let currentView = 'gallery';
        const switchView = (view) => {
            currentView = view;
            const galleryBtn = document.getElementById('btn-gallery');
            const mapBtn = document.getElementById('btn-map');
            const galleryView = document.getElementById('view-gallery');
            const mapView = document.getElementById('view-map');

            if (view === 'map') {
                galleryView.classList.add('hidden');
                mapView.classList.remove('hidden');
                galleryBtn.classList.remove('btn-active');
                mapBtn.classList.add('btn-active');
                
                // Initialize or invalidate map size
                if (!map) {
                    initMap();
                } else {
                    setTimeout(() => map.invalidateSize(), 100);
                }
            } else {
                galleryView.classList.remove('hidden');
                mapView.classList.add('hidden');
                galleryBtn.classList.add('btn-active');
                mapBtn.classList.remove('btn-active');
            }
        };

        // Modal Logic
        const openModal = (index) => {
            const p = properties[index];
            const modal = document.getElementById('detail-modal');
            const body = document.getElementById('modal-body');
            
            const isAssumable = p.assumable && p.assumable.length > 0;
            const mapQuery = encodeURIComponent(p.address);
            
            // Calculations
            const fhaDownPercent = 3.5;
            const fhaDownAmount = p.price * (fhaDownPercent / 100);
            const fhaPrincipal = p.price - fhaDownAmount;
            const fhaRate = 6.5;
            const fhaMonthly = calculateMortgage(fhaPrincipal, fhaRate, 30);

            let assumableMonthly = 0;
            let assumableRateNum = 0;
            if (isAssumable) {
                assumableRateNum = p.assumable === 'LOW' ? 3.0 : parseFloat(p.assumable.replace('%', ''));
                assumableMonthly = calculateMortgage(fhaPrincipal, assumableRateNum, 30);
            }

            body.innerHTML = `
                <div class="lg:w-1/2 flex flex-col bg-base-100">
                    <div class="relative h-64 lg:h-auto lg:flex-1">
                        <div class="swiper swiper-modal" id="swiper-modal">
                            <div class="swiper-wrapper">
                                ${p.imgs.map(img => `
                                <div class="swiper-slide">
                                    <img src="${img}" class="w-full h-64 lg:h-full object-cover" alt="${p.address}">
                                </div>`).join('')}
                            </div>
                            <div class="swiper-button-next"></div>
                            <div class="swiper-button-prev"></div>
                            <div class="swiper-pagination"></div>
                        </div>
                        <!-- Assumable Badge on Modal Image -->
                        ${isAssumable ? `
                        <div class="absolute top-4 right-4 z-20">
                            <div class="badge badge-success gap-2 font-bold py-3 px-4 shadow-lg text-white bg-success">
                                <i class="fa-solid fa-bolt"></i> ASSUMABLE AT ${p.assumable}
                            </div>
                        </div>` : ''}
                    </div>
                </div>
                
                <div class="lg:w-1/2 p-6 lg:p-8 overflow-y-auto flex flex-col gap-6">
                    <div>
                        <div class="flex justify-between items-start mb-2">
                            <h2 class="text-2xl font-extrabold text-base-content leading-tight">${p.address}</h2>
                        </div>
                        <p class="text-3xl font-black text-primary mb-4">${formatCurrency(p.price)}</p>
                        
                        <div class="flex flex-wrap gap-2 mb-4">
                            <div class="badge badge-outline badge-lg py-3"><i class="fa-solid fa-bed mr-2 text-primary"></i>${p.bedsBaths.split(' - ')[0]}</div>
                            <div class="badge badge-outline badge-lg py-3"><i class="fa-solid fa-bath mr-2 text-primary"></i>${p.bedsBaths.split(' - ')[1]}</div>
                            <div class="badge badge-outline badge-lg py-3"><i class="fa-solid fa-ruler-combined mr-2 text-primary"></i>${p.sqft.toLocaleString()} sqft</div>
                            <div class="badge badge-outline badge-lg py-3"><i class="fa-solid fa-calendar mr-2 text-primary"></i>Built ${p.year}</div>
                        </div>
                        
                        <p class="text-base-content/80 text-sm leading-relaxed border-b border-base-200 pb-4">${p.note}</p>
                    </div>

                    <!-- Calculator Component -->
                    <div class="bg-base-200 rounded-xl p-5">
                        <h3 class="text-lg font-bold mb-4 flex items-center gap-2">
                            <i class="fa-solid fa-calculator text-primary"></i> Mortgage Comparison
                        </h3>
                        
                        <div class="grid grid-cols-2 gap-4 mb-4 text-sm">
                            <div>
                                <p class="text-base-content/60">Purchase Price</p>
                                <p class="font-bold">${formatCurrency(p.price)}</p>
                            </div>
                            <div>
                                <p class="text-base-content/60">Down Payment (3.5%)</p>
                                <p class="font-bold">${formatCurrency(fhaDownAmount)}</p>
                            </div>
                            <div>
                                <p class="text-base-content/60">Loan Amount</p>
                                <p class="font-bold">${formatCurrency(fhaPrincipal)}</p>
                            </div>
                            <div>
                                <p class="text-base-content/60">Loan Term</p>
                                <p class="font-bold">30 Years Fixed</p>
                            </div>
                        </div>

                        <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-lg mb-3">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-sm font-semibold text-indigo-800">Standard FHA</span>
                                <span class="text-xs bg-indigo-200 text-indigo-800 px-2 py-0.5 rounded-full font-bold">6.5% Rate</span>
                            </div>
                            <p class="text-2xl font-extrabold text-indigo-700">${formatCurrency(fhaMonthly)}<span class="text-sm font-medium">/mo</span></p>
                            <p class="text-xs text-indigo-600/70 mt-1">Principal & Interest Only</p>
                        </div>

                        ${isAssumable ? `
                        <div class="bg-emerald-50 border border-emerald-100 p-4 rounded-lg relative overflow-hidden">
                            <div class="absolute top-0 right-0 bg-emerald-600 text-white text-[10px] font-bold px-2 py-1 rounded-bl-lg">💡 HUGE SAVINGS</div>
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-sm font-semibold text-emerald-800">Assumable Loan</span>
                                <span class="text-xs bg-emerald-200 text-emerald-800 px-2 py-0.5 rounded-full font-bold">${assumableRateNum}% Rate</span>
                            </div>
                            <p class="text-2xl font-extrabold text-emerald-700">${formatCurrency(assumableMonthly)}<span class="text-sm font-medium">/mo</span></p>
                            <p class="text-xs text-emerald-600/70 mt-1">Principal & Interest Only</p>
                            
                            <div class="mt-3 pt-3 border-t border-emerald-200 flex justify-between items-center bg-emerald-100 -m-4 p-3 mt-4">
                                <span class="text-xs font-bold text-emerald-900">Your Monthly Savings:</span>
                                <span class="text-lg font-extrabold text-emerald-900">${formatCurrency(fhaMonthly - assumableMonthly)}</span>
                            </div>
                        </div>
                        ` : ''}
                        
                        ${p.hoa > 0 ? `<p class="text-xs text-base-content/50 mt-3 text-center">+ ${formatCurrency(p.hoa)}/mo HOA (Not included in estimate)</p>` : ''}
                    </div>

                    <!-- Google Maps Hybrid Iframe -->
                    <div class="overflow-hidden rounded-xl border border-base-300 h-48">
                        <iframe 
                            width="100%" 
                            height="100%" 
                            frameborder="0" 
                            style="border:0" 
                            loading="lazy" 
                            referrerpolicy="no-referrer-when-downgrade"
                            src="https://maps.google.com/maps?q=${mapQuery}&t=k&z=15&output=embed">
                        </iframe>
                    </div>
                    
                    <a href="${p.url}" target="_blank" class="btn btn-primary btn-block mt-2">
                        <i class="fa-solid fa-up-right-from-square"></i> View Original Listing
                    </a>
                </div>
            `;

            modal.showModal();

            // Initialize Modal Swiper
            setTimeout(() => {
                if (swipers['swiper-modal']) {
                    swipers['swiper-modal'].destroy(true, true);
                }
                swipers['swiper-modal'] = new Swiper('#swiper-modal', {
                    loop: true,
                    spaceBetween: 0,
                    grabCursor: true,
                    pagination: { el: '#swiper-modal .swiper-pagination', clickable: true },
                    navigation: { nextEl: '#swiper-modal .swiper-button-next', prevEl: '#swiper-modal .swiper-button-prev' },
                });
            }, 100);
        };

        // Initial Render
        renderCards();
    </script>
</body>
</html>

                            <div class="swiper-pagination"></div>
                        </div>
                        <div class="absolute bottom-0 left-0 right-0 h-24 bg-gradient-to-t from-black/50 to-transparent z-10 pointer-events-none"></div>
                        <div class="absolute top-3 left-3 z-30 flex gap-2">
                            <div class="px-3 py-1 rounded-md shadow-sm text-sm font-bold bg-white/90 text-brand-800 backdrop-blur-sm backdrop-filter">
                                ${formatCurrency(p.price)}
                            </div>
                            ${isAssumable ? `
                            <div class="px-3 py-1 rounded-md shadow-sm text-xs font-bold bg-accent-600 text-white flex items-center gap-1">
                                <i class="fa-solid fa-bolt text-accent-200"></i> ${p.assumable}
                            </div>` : ''}
                        </div>
                    </div>
                    
                    <div class="p-5 flex flex-col flex-1 bg-white relative z-10">
                        <h3 class="font-bold text-brand-900 mb-2 leading-tight">${p.address}</h3>
                        <div class="flex flex-wrap gap-2 text-xs text-brand-600 mb-3 font-medium">
                            <span class="bg-brand-100 px-2 py-1 rounded">${p.bedsBaths}</span>
                            <span class="bg-brand-100 px-2 py-1 rounded">${p.sqft.toLocaleString()} sqft</span>
                            <span class="bg-brand-100 px-2 py-1 rounded">Built ${p.year}</span>
                        </div>
                        <p class="text-sm text-brand-500 line-clamp-3 flex-1 mb-4">${p.note}</p>
                        
                        <button onclick="openModal(${index})" class="w-full text-center bg-brand-800 text-white py-2.5 rounded-lg text-sm font-semibold hover:bg-brand-900 transition-colors mt-auto shadow-sm">
                            View Details & Calculator
                        </button>
                    </div>
                </div>
                `;
            }).join('');

            document.querySelectorAll('.swiper-card').forEach(el => {
                const id = el.id;
                if (!swipers[id]) {
                    swipers[id] = new Swiper(`#${id}`, {
                        loop: true,
                        grabCursor: true,
                        pagination: { el: `#${id} .swiper-pagination`, clickable: true },
                        navigation: { nextEl: `#${id} .swiper-button-next`, prevEl: `#${id} .swiper-button-prev` },
                    });
                }
            });
        };

        let map;
        const initMap = async () => {
            if (map) {
                map.invalidateSize();
                return;
            }
            
            map = L.map('leaflet-map').setView([45.4850, -122.8050], 11);
            
            // Google Maps Hybrid Satellite Layer
            L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
                attribution: '&copy; Google Maps'
            }).addTo(map);

            const geocodeUrl = (address) => `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}`;
            
            for (let i = 0; i < properties.length; i++) {
                const p = properties[i];
                try {
                    await new Promise(resolve => setTimeout(resolve, 200));
                    const res = await fetch(geocodeUrl(p.address));
                    const data = await res.json();
                    
                    if (data && data.length > 0) {
                        const lat = data[0].lat;
                        const lon = data[0].lon;
                        
                        const iconColor = p.assumable ? '#16a34a' : '#1e293b';
                        const customIcon = L.divIcon({
                            html: `<div style="background-color: ${iconColor}; color: white; border-radius: 50%; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.2); border: 2px solid white;">
                                ${p.assumable ? '<i class="fa-solid fa-bolt" style="font-size: 14px;"></i>' : '<i class="fa-solid fa-house" style="font-size: 12px;"></i>'}
                            </div>`,
                            className: '',
                            iconSize: [36, 36],
                            iconAnchor: [18, 18]
                        });

                        const marker = L.marker([lat, lon], { icon: customIcon }).addTo(map);
                        
                        const popupContent = `
                            <div class="p-2 font-sans" style="width: 240px;">
                                <img src="${p.imgs[0]}" alt="${p.address}" style="width:100%; height:110px; object-fit:cover; border-radius:6px; margin-bottom:8px;">
                                <h3 class="font-bold text-sm text-gray-900 leading-tight mb-1">${p.address}</h3>
                                <p class="text-brand-800 font-extrabold my-1">${formatCurrency(p.price)} ${p.assumable ? '<span class="text-accent-700 text-xs font-bold">(Assumable)</span>' : ''}</p>
                                <div class="text-xs text-gray-500 mb-3">${p.bedsBaths} • ${p.sqft.toLocaleString()} sqft</div>
                                <button onclick="openModal(${i})" class="w-full text-center bg-brand-800 text-white py-2 rounded-lg text-xs font-bold hover:bg-brand-900 transition">View Details</button>
                            </div>
                        `;
                        
                        marker.bindPopup(popupContent, { className: 'custom-popup' });
                    }
                } catch (e) {
                    console.error("Geocoding failed for", p.address, e);
                }
            }
        };

        const activeBtnClass = 'px-3 py-1.5 text-xs font-semibold rounded-md transition-all flex items-center gap-1.5 bg-brand-800 text-white shadow-sm';
        const inactiveBtnClass = 'px-3 py-1.5 text-xs font-semibold rounded-md transition-all flex items-center gap-1.5 text-brand-600 hover:bg-brand-200';

        const switchView = (view) => {
            const galleryBtn = document.getElementById('btn-gallery');
            const mapBtn = document.getElementById('btn-map');
            const galleryView = document.getElementById('view-gallery');
            const mapView = document.getElementById('view-map');

            if (view === 'map') {
                galleryView.classList.add('hidden');
                mapView.classList.remove('hidden');
                galleryBtn.className = inactiveBtnClass;
                mapBtn.className = activeBtnClass;
                initMap();
            } else {
                galleryView.classList.remove('hidden');
                mapView.classList.add('hidden');
                galleryBtn.className = activeBtnClass;
                mapBtn.className = inactiveBtnClass;
            }
        };

        const openModal = (index) => {
            const p = properties[index];
            const modal = document.getElementById('detail-modal');
            const body = document.getElementById('modal-body');
            
            const isAssumable = p.assumable && p.assumable.length > 0;
            const mapQuery = encodeURIComponent(p.address);
            
            const fhaDownPercent = 3.5;
            const fhaDownAmount = p.price * (fhaDownPercent / 100);
            const fhaPrincipal = p.price - fhaDownAmount;
            const fhaRate = 6.5;
            const fhaMonthly = calculateMortgage(fhaPrincipal, fhaRate, 30);

            let assumableMonthly = 0;
            let assumableRateNum = 0;
            if (isAssumable) {
                assumableRateNum = p.assumable === 'LOW' ? 3.0 : parseFloat(p.assumable.replace('%', ''));
                assumableMonthly = calculateMortgage(fhaPrincipal, assumableRateNum, 30);
            }

            body.innerHTML = `
                <!-- Image Section at the Top (Strict Aspect Ratio) -->
                <div class="relative w-full h-72 md:h-[450px] bg-brand-900 overflow-hidden">
                    <div class="absolute inset-0 z-0 swiper swiper-modal" id="swiper-modal">
                        <div class="swiper-wrapper">
                            ${p.imgs.map(img => `<div class="swiper-slide"><img src="${img}" alt="${p.address}"></div>`).join('')}
                        </div>
                        <div class="swiper-button-next"></div>
                        <div class="swiper-button-prev"></div>
                        <div class="swiper-pagination"></div>
                    </div>
                    
                    <div class="absolute bottom-0 left-0 right-0 h-32 bg-gradient-to-t from-black/60 to-transparent z-10 pointer-events-none"></div>

                    ${isAssumable ? `
                    <div class="absolute top-4 right-4 z-30">
                        <div class="px-4 py-1.5 rounded-md shadow-lg font-bold text-sm bg-accent-600 text-white flex items-center gap-2">
                            <i class="fa-solid fa-bolt"></i> ASSUMABLE AT ${p.assumable}
                        </div>
                    </div>` : ''}
                    
                    <div class="absolute bottom-4 left-4 z-30">
                        <h2 class="text-2xl font-extrabold text-white leading-tight drop-shadow-md">${p.address}</h2>
                        <p class="text-xl font-black text-white mt-1 drop-shadow-md">${formatCurrency(p.price)}</p>
                    </div>
                </div>
                
                <!-- Content Section Below Image -->
                <div class="p-6 md:p-8">
                    <div class="flex flex-wrap gap-2 mb-4">
                        <span class="flex items-center gap-1.5 text-xs bg-brand-100 text-brand-700 px-2.5 py-1.5 rounded font-semibold">
                            <i class="fa-solid fa-bed text-brand-400"></i>${p.bedsBaths.split(' - ')[0]}
                        </span>
                        <span class="flex items-center gap-1.5 text-xs bg-brand-100 text-brand-700 px-2.5 py-1.5 rounded font-semibold">
                            <i class="fa-solid fa-bath text-brand-400"></i>${p.bedsBaths.split(' - ')[1]}
                        </span>
                        <span class="flex items-center gap-1.5 text-xs bg-brand-100 text-brand-700 px-2.5 py-1.5 rounded font-semibold">
                            <i class="fa-solid fa-ruler-combined text-brand-400"></i>${p.sqft.toLocaleString()} sqft
                        </span>
                        <span class="flex items-center gap-1.5 text-xs bg-brand-100 text-brand-700 px-2.5 py-1.5 rounded font-semibold">
                            <i class="fa-solid fa-calendar text-brand-400"></i>${p.year}
                        </span>
                    </div>
                    
                    <p class="text-sm text-brand-600 leading-relaxed border-b border-brand-100 pb-4 mb-4">${p.note}</p>

                    <!-- Calculator Component -->
                    <div class="bg-brand-50 rounded-xl p-5 border border-brand-100 mb-4">
                        <h3 class="text-sm font-bold mb-4 flex items-center gap-2 text-brand-800 uppercase tracking-wide">
                            <i class="fa-solid fa-calculator text-brand-500"></i> Mortgage Estimate
                        </h3>
                        
                        <div class="grid grid-cols-2 gap-x-4 gap-y-2 mb-4 text-sm">
                            <div class="flex justify-between col-span-2"><span class="text-brand-500">Purchase Price</span><span class="font-semibold text-brand-800">${formatCurrency(p.price)}</span></div>
                            <div class="flex justify-between col-span-2"><span class="text-brand-500">Down Payment (3.5%)</span><span class="font-semibold text-brand-800">${formatCurrency(fhaDownAmount)}</span></div>
                            <div class="flex justify-between col-span-2"><span class="text-brand-500">Loan Amount</span><span class="font-semibold text-brand-800">${formatCurrency(fhaPrincipal)}</span></div>
                            <div class="flex justify-between col-span-2 border-b border-brand-200 pb-2 mb-2"><span class="text-brand-500">Term</span><span class="font-semibold text-brand-800">30 Yr Fixed</span></div>
                        </div>

                        <div class="bg-white border border-brand-200 p-4 rounded-lg mb-3 shadow-sm">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-xs font-semibold text-brand-700">Standard FHA</span>
                                <span class="text-[10px] bg-brand-100 text-brand-600 px-2 py-0.5 rounded-full font-bold">6.5% Rate</span>
                            </div>
                            <p class="text-2xl font-extrabold text-brand-800">${formatCurrency(fhaMonthly)}<span class="text-xs font-medium text-brand-500">/mo</span></p>
                            <p class="text-[10px] text-brand-400 mt-1">Principal & Interest Only</p>
                        </div>

                        ${isAssumable ? `
                        <div class="bg-accent-50 border border-accent-200 p-4 rounded-lg relative overflow-hidden shadow-sm">
                            <div class="absolute top-0 right-0 bg-accent-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-bl-lg">SAVINGS</div>
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-xs font-semibold text-accent-800">Assumable Loan</span>
                                <span class="text-[10px] bg-accent-100 text-accent-700 px-2 py-0.5 rounded-full font-bold">${assumableRateNum}% Rate</span>
                            </div>
                            <p class="text-2xl font-extrabold text-accent-800">${formatCurrency(assumableMonthly)}<span class="text-xs font-medium text-accent-600">/mo</span></p>
                            <p class="text-[10px] text-accent-500 mt-1">Principal & Interest Only</p>
                            
                            <div class="mt-3 pt-3 border-t border-accent-200 flex justify-between items-center">
                                <span class="text-xs font-bold text-accent-900">Monthly Savings:</span>
                                <span class="text-sm font-extrabold text-accent-900">${formatCurrency(fhaMonthly - assumableMonthly)}</span>
                            </div>
                        </div>
                        ` : ''}
                        
                        ${p.hoa > 0 ? `<p class="text-[10px] text-brand-400 mt-3 text-center">+ ${formatCurrency(p.hoa)}/mo HOA (Not included in estimate)</p>` : ''}
                    </div>

                    <!-- Google Maps Hybrid Iframe -->
                    <div class="overflow-hidden rounded-xl border border-brand-200 h-56 bg-brand-100 mb-4 relative">
                        <iframe 
                            width="100%" 
                            height="100%" 
                            frameborder="0" 
                            style="border:0" 
                            loading="lazy" 
                            referrerpolicy="no-referrer-when-downgrade"
                            allowfullscreen
                            src="https://maps.google.com/maps?q=${mapQuery}&t=k&z=15&ie=UTF8&output=embed">
                        </iframe>
                    </div>
                    
                    <a href="${p.url}" target="_blank" class="inline-flex items-center justify-center w-full px-4 py-3 bg-brand-800 text-white font-semibold rounded-lg shadow-sm hover:bg-brand-900 transition-colors">
                        <i class="fa-solid fa-up-right-from-square mr-2"></i> View Original Listing
                    </a>
                </div>
            `;

            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);

            setTimeout(() => {
                if (swipers['swiper-modal']) {
                    swipers['swiper-modal'].destroy(true, true);
                }
                swipers['swiper-modal'] = new Swiper('#swiper-modal', {
                    loop: true,
                    grabCursor: true,
                    pagination: { el: '#swiper-modal .swiper-pagination', clickable: true },
                    navigation: { nextEl: '#swiper-modal .swiper-button-next', prevEl: '#swiper-modal .swiper-button-prev' },
                });
            }, 100);
        };

        const closeModal = () => {
            const modal = document.getElementById('detail-modal');
            modal.classList.add('opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        // Close modal on overlay click
        document.getElementById('detail-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        renderCards();
    </script>
</body>
</html>
